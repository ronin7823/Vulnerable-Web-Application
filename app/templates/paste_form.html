{% extends "base.html" %}
{% block title %}New Paste — PasteBoard{% endblock %}
{% block content %}
  <h1>New Paste</h1>
  <form method="POST">
    <label for="title">Title</label>
    <input type="text" id="title" name="title" placeholder="My snippet" required autofocus>

    <label for="language">Language</label>
    <select id="language" name="language">
      <option value="text">Plain Text</option>
      <option value="python">Python</option>
      <option value="javascript">JavaScript</option>
      <option value="html">HTML</option>
      <option value="css">CSS</option>
      <option value="sql">SQL</option>
      <option value="php">PHP</option>
      <option value="bash">Bash</option>
      <option value="other">Other</option>
    </select>

    <label for="body">Content</label>
    <textarea id="body" name="body" rows="10" placeholder="Paste your code here..." required></textarea>

    <div role="group">
      <button type="submit">Save Paste</button>
      <a href="{{ url_for('main.index') }}" role="button" class="outline">Cancel</a>
    </div>
  </form>
{% endblock %}
