{% extends "base.html" %}
{% block title %}CyberBlog — Compose Message{% endblock %}
{% block content %}
<div style="max-width: 600px; margin: 2rem auto;">
  <p style="font-family:var(--font-mono); font-size:0.75rem; color:var(--neon-blue); letter-spacing:0.2em; text-transform:uppercase; margin-bottom:0.5rem;">// NEW MESSAGE //</p>
  <h1 style="font-family:var(--font-display); font-size:1.4rem; font-weight:900; color:var(--neon-yellow); margin-bottom:2rem;">[ COMPOSE ]</h1>

  <div class="card">
    <form method="POST" action="{{ url_for('main.compose') }}">

      <div class="form-group">
        <label for="recipient_id">To</label>
        <select name="recipient_id" id="recipient_id" required>
          <option value="" disabled selected>-- select recipient --</option>
          {% for user in users %}
            <option value="{{ user.id }}">{{ user.username }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label for="subject">Subject</label>
        <input type="text" name="subject" id="subject" placeholder="Enter subject..." required maxlength="200">
      </div>

      <div class="form-group">
        <label for="body">Message</label>
        <textarea name="body" id="body" rows="6" placeholder="Write your message..." required style="min-height:140px;"></textarea>
      </div>

      <div style="display:flex; gap:1rem; align-items:center; margin-top:1.5rem;">
        <button type="submit" class="btn btn-primary">Send →</button>
        <a href="{{ url_for('main.inbox') }}" class="btn btn-secondary">Cancel</a>
      </div>

    </form>
  </div>
</div>
{% endblock %}
