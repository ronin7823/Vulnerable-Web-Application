{% extends "base.html" %}
{% block title %}CyberBlog — Edit Post{% endblock %}
{% block content %}

<div style="max-width: 600px; margin: 2rem auto;">

  <div style="margin-bottom: 2rem;">
    <p style="font-family:var(--font-mono); font-size:0.75rem; color:var(--neon-blue); letter-spacing:0.2em; text-transform:uppercase; margin-bottom:0.5rem;">// EDIT POST //</p>
    <h1 style="font-family:var(--font-display); font-size:1.4rem; font-weight:900; color:var(--neon-yellow); letter-spacing:0.1em;">
      [ POST #{{ paste.id }} ]
    </h1>
    <p style="font-family:var(--font-mono); font-size:0.75rem; color:var(--text-secondary); margin-top:0.4rem;">
      // Author ID: <span style="color:var(--neon-blue);">{{ paste.user_id }}</span> &nbsp;|&nbsp; Your ID: <span style="color:var(--neon-blue);">{{ current_user.id }}</span> //
    </p>

  </div>
  <div class="card">
    <p style="font-family:var(--font-mono); font-size:0.75rem; color:var(--neon-pink); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:1.2rem;">// UPDATE POST //</p>
    <form method="POST">
      <div class="form-group">
        <label for="title">// Title</label>
        <input type="text" id="title" name="title" value="{{ paste.title }}" placeholder="post title..." required>
      </div>
      <div class="form-group">
        <label for="language">// Language</label>
        <select id="language" name="language" style="width:100%; background:var(--bg-card); border:1px solid var(--border-color); color:var(--text-primary); font-family:var(--font-mono); font-size:0.85rem; padding:0.6rem; border-radius:4px;">
          {% for lang in ["text","python","javascript","bash","html","sql","c","cpp","java"] %}
          <option value="{{ lang }}" {% if paste.language == lang %}selected{% endif %}>{{ lang }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label for="body">// Content</label>
        <textarea id="body" name="body" rows="10" placeholder="post content..." required
          style="width:100%; background:var(--bg-card); border:1px solid var(--border-color); color:var(--text-primary); font-family:var(--font-mono); font-size:0.85rem; padding:0.6rem; border-radius:4px; resize:vertical;">{{ paste.body }}</textarea>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; padding:0.8rem; margin-top:0.5rem;">
        SAVE CHANGES →
      </button>
    </form>
  </div>

  <div style="margin-top:1rem; text-align:center;">
    <a href="{{ url_for('main.index') }}"
       style="font-family:var(--font-mono); font-size:0.75rem; color:var(--text-secondary); text-decoration:none;">
      ← back to posts
    </a>
  </div>

</div>
{% endblock %}
