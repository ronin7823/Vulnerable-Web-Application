{% extends "base.html" %}
{% block title %}CyberBlog — New Identity{% endblock %}
{% block content %}

<div style="max-width: 420px; margin: 3rem auto;">
  <div style="text-align:center; margin-bottom:2rem;">
    <p style="font-family:var(--font-mono); font-size:0.75rem; color:var(--neon-pink); letter-spacing:0.2em; text-transform:uppercase; margin-bottom:0.5rem;">// CREATE NEW IDENTITY //</p>
    <h1 style="font-family:var(--font-display); font-size:1.8rem; font-weight:900; color:var(--neon-blue); text-shadow: 0 0 20px rgba(0,212,255,0.4); letter-spacing:0.1em;">REGISTER</h1>
  </div>

  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label for="username">// Choose User ID</label>
        <input type="text" id="username" name="username" placeholder="pick a username..." required autofocus autocomplete="off">
      </div>
      <div class="form-group">
        <label for="password">// Set Password</label>
        <input type="password" id="password" name="password" placeholder="choose a strong password..." required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%; margin-top:0.5rem; padding:0.8rem; border-color:var(--neon-blue); color:var(--neon-blue);">CREATE IDENTITY →</button>
    </form>
  </div>

  <p style="text-align:center; font-family:var(--font-mono); font-size:0.8rem; color:var(--text-secondary); margin-top:1rem;">
    Already exist? <a href="{{ url_for('auth.login') }}" style="color:var(--neon-green);">Authenticate here</a>
  </p>
</div>

{% endblock %}
